name: Build Lambda Image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: gate
        run: |
          if [[ -n "${{ vars.AWS_ROLE_TO_ASSUME }}" && "${{ github.event_name }}" != "pull_request" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.push == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - if: steps.gate.outputs.push == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ steps.gate.outputs.push == 'true' }}
          load: ${{ steps.gate.outputs.push != 'true' }}
          tags: ${{ steps.gate.outputs.push == 'true' && format('{0}/growler-federation:{1},{0}/growler-federation:latest', steps.ecr.outputs.registry, github.sha) || format('growler-federation:{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
